<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BarriGame - Menú</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100vh;
}

/* 🌌 fondo suave */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 40%),
        radial-gradient(circle at bottom, rgba(255,255,255,0.04), transparent 50%);
    pointer-events: none;
}

/* 🎮 título */
h1 {
    font-size: 42px;
    margin-bottom: 10px;
    letter-spacing: 2px;
}

/* 📌 subtítulo */
p {
    opacity: 0.8;
    margin-bottom: 30px;
}

/* 🔘 botones menú */
.menu {
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
}

button {
    width: 220px;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-weight: bold;
    cursor: pointer;

    background: white;
    color: black;

    transition: all 0.2s ease;

    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

button:hover {
    transform: scale(1.05);
    background: #f2f2f2;
}

/* 🏷️ versión */
.version {
    margin-top: 40px;
    font-size: 12px;
    opacity: 0.5;
}

</style>
</head>

<body>

<h1>⚽ BarriGame</h1>
<p>¿Estás listo para el reto?</p>

<div class="menu">

    <button onclick="location.href='juego.html'">
        🎮 Jugar
    </button>

    <button onclick="alert('Modo Torneo aún en desarrollo 🔥')">
        🏆 Torneo
    </button>

    <button onclick="alert('Próximamente ⚙️ ajustes avanzados')">
        ⚙️ Ajustes
    </button>

</div>

<div class="version">
    v1.0 - Football Market Game
</div>

</body>
</html>
